[project]
name        = "depthflow"
description = "🌊 Images to 3D Parallax effect video"
authors     = [{name="Tremeschin"}]
version     = "0.10.0"
readme      = "readme.md"
license     = "AGPL-3.0"
requires-python = ">=3.10"
dependencies = [
    "cyclopts",
    "diskcache",
    "gradio~=6.0",
    "imageio",
    "platformdirs",
    "pydantic",
    "shaderflow",
    "torch",
    "torchvision",
    "transformers",
    "typer",
    "xxhash",
]

[project.scripts]
depthflow = "depthflow.__main__:main"
depth     = "depthflow.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
