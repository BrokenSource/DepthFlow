name: release
on:
  workflow_dispatch:
  # push:
  #   tags:
  #     - "v*"

jobs:
  main:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
      - run:  uv build --wheel
      - run:  uv publish
